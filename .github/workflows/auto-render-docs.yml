name: Automated Cross-Repo Documentation Pipeline

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  ingest-and-publish:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Checkout the central hub repository that orchestrates the site layout
      - name: Checkout Central Documentation Hub
        uses: actions/checkout@v4
        with:
          path: hub

      # Step 2: Ingest legacy manually written checklists
      - name: Ingest Legacy Manual Repository (currentdoc)
        uses: actions/checkout@v4
        with:
          repository: jijeeshlab/currentdoc
          token: ${{ secrets.CENTRAL_DOCS_TOKEN }}
          path: currentdoc_src
          ref: main
          persist-credentials: false

      # Step 3: Ingest Greenfield code modules
      - name: Ingest Greenfield Source Code Repository
        uses: actions/checkout@v4
        with:
          repository: jijeeshlab/greenfield-code
          token: ${{ secrets.CENTRAL_DOCS_TOKEN }}
          path: greenfield_src
          ref: main
          persist-credentials: false

      # Step 4: Ingest Brownfield migration assets
      - name: Ingest Brownfield Source Code Repository
        uses: actions/checkout@v4
        with:
          repository: jijeeshlab/brownfield-code
          token: ${{ secrets.CENTRAL_DOCS_TOKEN }}
          path: brownfield_src
          ref: main
          persist-credentials: false

      # Step 5: Consolidate cross-repo sources and aggressively fix all encoding matrix layouts
      - name: Consolidate Code Assets and Manual Artifacts
        run: |
          mkdir -p hub/src
          mkdir -p hub/docs/legacy
          
          # 1. Copy source directories from code spokes into the hub compilation root
          [ -d "greenfield_src/src" ] && cp -r greenfield_src/src/. hub/src/
          [ -d "brownfield_src/src" ] && cp -r brownfield_src/src/. hub/src/
          
          # 2. Sync manual files into the legacy target folder block
          rsync -av --exclude='.git*' currentdoc_src/ hub/docs/legacy/
          
          # 3. Handle missing home landing page before running encoding fixes
          if [ ! -f "hub/docs/index.md" ]; then
            echo "[Setup] Injecting landing page resource..."
            if [ -f "hub/README.md" ]; then
              cp hub/README.md hub/docs/index.md
            else
              echo "# Welcome Dashboard" > hub/docs/index.md
              echo "Welcome to the JijeeshLab Operations Portal control deck." >> hub/docs/index.md
            fi
          fi

          # 4. GLOBAL SELF-HEALING ENGINE: Aggressively target and rewrite ANY UTF-16 markdown file inside hub/docs/
          echo "[Self-Healing] Scanning and sanitizing all target workspace markdown files..."
          find hub/docs/ -name "*.md" -type f | while read -r file; do
            # Fallback check using file metadata signature or looking for byte order marks
            if file "$file" | grep -E 'UTF-16|UCS-2' || head -c 2 "$file" | grep -q $'\xff\xfe' || head -c 2 "$file" | grep -q $'\xfe\xff'; then
              echo "[Self-Healing] Rewriting encoding format to clean UTF-8 for: $file"
              iconv -f UTF-16 -t UTF-8 "$file" > "${file}.tmp" && mv "${file}.tmp" "$file"
            fi
          done

      # Step 6: Deploy isolated Python workspace runtime environments
      - name: Set Up Python Environment Engine
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Step 7: Bootstrap site generation framework components and reflection parsers
      - name: Install MkDocs and Automated AutoDoc Parsers
        run: |
          pip install mkdocs-material "mkdocstrings[python]"

      # Step 8: Build the site assets using strict link auditing guidelines
      - name: Compile Automated Portal Structure
        run: |
          cd hub
          mkdocs build --strict

      # Step 9: Launch deployment modifications directly to live production web nodes
      - name: Deploy Self-Healed Unified Artifacts to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./hub/site